# XlingranAuth 配置文件
# 颜色代码请用 & 开头，例如 &a &c &7

gui:
  # 界面标题（须与代码中用于识别的一致，修改后需重载）
  title: "&a&lXlingran Auth &7- &f创作者: shan"
  # 行数（每行 9 格）；边框会随行数自动铺满四边
  rows: 3
  # 玩家进入服务器时是否自动打开认证界面
  open-on-join: false

creator:
  # 中央说明物品显示名
  item-name: "&e&l创作者认证说明"
  # 说明物品 Lore（每行一条）
  lore:
    - "&7本插件用于展示创作者身份，防止盗用。"
    - "&7官网: &bwww.xlingran.com"
    - "&7"
    - "&a左侧绿宝石 &7= 确认已阅读并认证"
    - "&c右侧屏障 &7= 关闭界面（不认证）"

messages:
  only-players: "&c该命令只能由玩家使用。"
  authenticated: "&a您已通过创作者身份认证，感谢支持正版信息。"
  already-authenticated: "&7您已经完成认证，无需重复操作。"
  closed: "&7已关闭认证界面。"
  no-permission: "&c您没有权限执行此操作。"
  reloaded: "&a配置已重新加载。"
  help-header: "&6=== XlingranAuth &7帮助 &6==="
  help-line-1: "&e/xauth &7- 打开认证界面"
  help-line-2: "&e/xauth reload &7- 重载配置 &8(需权限)"
  help-line-3: "&e/xauth status &7- 查看当前认证状态"

slots:
  # 槽位从 0 起算，且须小于 gui.rows * 9（默认 3 行时为 0–26）
  info: 13
  confirm: 11
  cancel: 15

confirm-item:
  name: "&a&l确认认证"
  lore:
    - "&7点击表示已阅读说明并认可创作者信息"

cancel-item:
  name: "&c&l关闭"
  lore:
    - "&7关闭界面，不进行认证"
