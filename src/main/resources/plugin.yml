name: XlingranAuth
version: ${project.version}
main: com.xlingran.auth.XlingranAuth
author: shan
description: 创作者身份展示与认证；适配约 1.12.x–Paper 26.1.x（见 README）

commands:
  xauth:
    description: 打开认证界面；子命令 reload / help / status
    usage: /xauth [reload|help|status]
    aliases: [xlingran, auth]

permissions:
  xlingranauth.use:
    description: 打开认证界面并完成认证
    default: true
  xlingranauth.admin:
    description: 重载配置与认证数据
    default: op
