# Gui界面
# 箱子管理Gui
Rongqi: 
    # 箱子管理Gui标题
    name: "&6容器管理"
    # 唯一名称，不能重复
    Alone:
        # 物品ID
        material: PLAYER_HEAD
        # 格子位置，不能超过 26 格
        slot: 10
        # 名称
        name: "&e独立权限"
        # Lore
        Lore:
            - "&2● &7授权的玩家可以打开这个容器"
            - "&2● &7对单容器的设置"
    Global:
        material: WHEAT
        slot: 12
        name: "&e全局权限设置"
        Lore:
            - "&2● &7授权玩家可以打开你所有的容器"
            - "&2● &7对所有容器设置"
    Lock:
        material: CHEST
        slot: 14
        name: "&e锁定开关"
        Lore:
            - "&3● &a私有 &7- 拥有权限的玩家才能打开"
            - "&3● &c公开 &7- 所有的玩家都可以打开你的容器"
            - "&2● &7点击切换你的容器状态"
            - "&2● &7容器公开后只能 &6打开 &7,不能 &6破坏"
            - ""
            - "&3● &7当前状态: {Lockstatus}"
    Funnel:
        material: HOPPER
        slot: 16
        name: "&e漏斗开关"
        Lore:
            - "&2● &7打开和关闭漏斗传输"
            - "&2● &7点击切换开关"
            - ""
            - "&3● &7当前状态: {Funnelstatus}"
    Password:
        material: PAPER
        slot: 20
        name: "&e密码箱"
        Lore:
            - "&2● &7为箱子设置 &6密码保护"
            - "&2● &7设置后有 &6密码的玩家 &7可以打开"
            - "&3● &7再次点击可 &6清除 &7密码"
            - "&3● &7会绕过授权"
            - ""
            - "&3● &7当前状态: {Password}"
    Manage:
        material: REPEATER
        slot: 22
        name: "&e管理面板"
        Lore:
            - "&2● &7管理容器默认设置"
            - "&2● &7新放置的容器将按照设置的模式"
            - "&3● &7默认都是 &6关闭 &7的"
    Development:
        material: BARRIER
        slot: 24
        name: "&e待开发"
        Lore:
            - "&7目前未开放"
#单独权限设置Gui
IndPer:
    name: "&b独立权限设置"
    SetPer:
        material: NAME_TAG
        slot: 11
        name: "&e设置权限"
        Lore:
            - "&2● &7对单个容器的权限添加"
            - "&2● &7点击玩家头颅后可 &6添加权限"
            - "&3● &7被添加权限的玩家可 &6破坏 &7你的容器"
    DelPer:
        material: BEACON
        slot: 15
        name: "&e取消权限"
        Lore:
            - "&2● &7对单个容器的权限移除"
            - "&2● &7点击玩家头颅后可移除权限"
    IndPerBack:
        material: WHITE_STAINED_GLASS_PANE
        slot: 26
        name: "&e返回"
        Lore:
            - "&2● &7返回上一级菜单"
# 全局权限设置Gui
GloPer:
    name: "&b全局权限设置"
    SetGloPer:
        material: NAME_TAG
        slot: 11
        name: "&e添加全局权限"
        Lore:
            - "&2● &7但是依旧可以在单个容器取消权限"
            - "&2● &7之后放置的也会自动授权权限"
            - "&3● &7点击玩家头颅添加授权权限"
            - "&3● &7授权玩家可以打开你 &6所有容器"
    DelGloPer:
        material: BEACON
        slot: 15
        name: "&c删除全局权限"
        Lore:
            - "&2● &7移除玩家打开你所有容器权限"
            - "&2● &7会移除 &6之前单独授权 &7的权限"
            - "&2● &7点击玩家头颅后会移除权限"
    GloPerBack:
        material: WHITE_STAINED_GLASS_PANE
        slot: 26
        name: "&f返回"
        Lore:
            - "&8返回上一级菜单"
# 管理面板Gui
ManagePanel:
    name: "&b管理面板"
    DeafultBox:
        material: BOOK
        slot: 1
        name: "&e默认容器锁定设置"
        Lore:
            - "&3● &a公开 &7- 新放置的容器默认为公开"
            - "&3● &c私有 &7- 新放置的容器默认为私有"
            - ""
            - "&3● &7当前默认状态: {DefaultBoxStatus}"
    DefaultFunnel:
        material: HOPPER
        slot: 2
        name: "&b默认漏斗传输设置"
        Lore:
            - "&3● &a打开 &7- 新放置的容器默认打开漏斗传输"
            - "&3● &c关闭 &7- 新放置的容器默认关闭漏斗传输"
            - ""
            - "&3● &7当前状态: {DefaultFunnel}"
    ManageBack:
        material: WHITE_STAINED_GLASS_PANE
        slot: 8
        name: "&e返回"
        Lore:
            - "&2● &7点击返回上一级菜单"

# 变量设置
Variable:
    # 锁定开关变量
    LockstatusOn: "&a公开"
    LockstatusOFF: "&c私有"
    # 漏斗开关变量
    FunnelstatusOn: "&a打开"
    FunnelstatusOFF: "&c关闭"
    # 密码箱变量
    PasswordOn: "&a已设置"
    PasswordOFF: "&c未设置"
    # 默认箱子 私有/公开 设置
    DefaultBoxStatusOn: "&a公开"
    DefaultBoxStatusOFF: "&c私有"
    # 默认漏斗开关设置
    DefaultFunnelOn: "&a打开"
    DefaultFunnelOFF: "&c关闭"
    
