# Gui界面
# 箱子管理Gui
Rongqi: 
    # 箱子管理Gui标题
    name: "&d容器管理"
    Alone:
        material: PLAYER_HEAD
        slot: 10
        # 名称
        name: "&b独立权限"
        # Lore
        Lore:
            - ""
            - "&8&l- &6授权的玩家可以打开这个容器"
            - "&8&l- &6对单容器的设置"
    Global:
        material: WHEAT
        slot: 12
        name: "&b全局权限设置"
        Lore:
            - ""
            - "&8&l- &6授权玩家可以打开你所有的容器"
            - "&8&l- &6对所有容器设置"
    Lock:
        material: CHEST
        slot: 14
        name: "&b锁定开关"
        Lore:
            - ""
            - "&3私有 &8&l- &6拥有权限的玩家才能打开"
            - "&3公开 &8&l- &6所有的玩家都可以打开你的容器"
            - "&8&l- &6点击切换你的容器状态"
            - "&8&l- &6容器公开后只能打开，不能破坏"
            - ""
            - "&9当前状态: {Lockstatus}"
    Funnel:
        material: HOPPER
        slot: 16
        name: "&b漏斗开关"
        Lore:
            - ""
            - "&8&l- &6打开和关闭漏斗传输"
            - "&8&l- &6点击切换开关"
            - ""
            - "&9当前状态: {Funnelstatus}"
    Password:
        material: PAPER
        slot: 20
        name: "&b密码箱"
        Lore:
            - ""
            - "&8&l- &6为箱子设置密码保护"
            - "&8&l- &6设置后有密码的玩家可以打开"
            - "&8&l- &6会绕过授权"
            - ""
            - "&9当前状态: {Password}"
    Manage:
        material: REPEATER
        slot: 22
        name: "&b管理面板"
        Lore:
            - ""
            - "&8&l- &6管理容器默认设置"
            - "&8&l- &6新放置的容器将按照设置的模式"
            - "&8&l- &6默认都是 &c关闭 &6的"
    Development:
        material: BARRIER
        slot: 24
        name: "&b待开发"
        Lore:
            - "&8目前未开放"
#单独权限设置Gui
IndPer:
    name: "&b独立权限设置"
    SetPer:
        material: NAME_TAG
        slot: 11
        name: "&a设置权限"
        Lore:
            - ""
            - "&8&l- &6对单个容器的权限添加"
            - "&8&l- &6点击玩家头颅后可添加权限"
            - "&8&l- &6被添加权限的玩家可破坏你的容器"
    DelPer:
        material: BEACON
        slot: 15
        name: "&c取消权限"
        Lore:
            - ""
            - "&8&l- &6对单个容器的权限移除"
            - "&8&l- &6点击玩家头颅后可移除权限"
    IndPerBack:
        material: WHITE_STAINED_GLASS_PANE
        slot: 26
        name: "&f返回"
        Lore:
            - ""
            - "&8返回上一级菜单"
# 全局权限设置Gui
GloPer:
    name: "&b全局权限设置"
    SetGloPer:
        material: NAME_TAG
        slot: 11
        name: "&a添加全局权限"
        Lore:
            - ""
            - "&8&l- &6授权玩家可以打开你所有容器"
            - "&8&l- &6但是依旧可以在单个容器取消权限"
            - "&8&l- &6之后放置的也会自动授权权限"
            - "&8&l- &6点击玩家头颅添加授权权限"
    DelGloPer:
        material: BEACON
        slot: 15
        name: "&c删除全局权限"
        Lore:
            - ""
            - "&8&l- &6移除玩家打开你所有容器权限"
            - "&8&l- &6会移除之前单独授权的权限"
            - "&8&l- &6点击玩家头颅后会移除权限"
    GloPerBack:
        material: WHITE_STAINED_GLASS_PANE
        slot: 26
        name: "&f返回"
        Lore:
            - ""
            - "&8返回上一级菜单"
# 管理面板Gui
ManagePanel:
    name: "&b管理面板"
    DeafultBox:
        material: BOOK
        slot: 1
        name: "&b默认 &e公开/私有 &b设置"
        Lore:
            - ""
            - "&3私有 &8&l- &6新放置的容器默认为私有"
            - "&3公开 &8&l- &6新放置的容器默认为公开"
            - ""
            - "&9当前默认状态: {DefaultBoxStatus}"
    DefaultFunnel:
        material: HOPPER
        slot: 2
        name: "&b默认 &e漏斗开关 &b设置"
        Lore:
            - ""
            - "&3打开 &8&l- &6新放置的容器默认打开漏斗传输"
            - "&3关闭 &8&l- &6新放置的容器默认关闭漏斗传输"
            - "&8&l- &6默认漏斗开关"
            - ""
            - "&e当前状态: {DefaultFunnel}"
    ManageBack:
        material: WHITE_STAINED_GLASS_PANE
        slot: 8
        name: "&f返回"
        Lore:
            - ""
            - "&8点击返回上一级菜单"

# 变量设置
Variable:
    # 锁定开关变量
    LockstatusOn: "&a公开"
    LockstatusOFF: "&c私有"
    # 漏斗开关变量
    FunnelstatusOn: "&a打开"
    FunnelstatusOFF: "&c关闭"
    # 密码箱变量
    PasswordOn: "&a已设置"
    PasswordOFF: "&c未设置"
    # 默认箱子 私有/公开 设置
    DefaultBoxStatusOn: "&a公开"
    DefaultBoxStatusOFF: "&c私有"
    # 默认漏斗开关设置
    DefaultFunnelOn: "&a打开"
    DefaultFunnelOFF: "&c关闭"
    